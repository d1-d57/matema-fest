name: post-deploy-check

# Run PageSpeed Insights against the live Pages site after each meaningful
# push to main, and commit the report under .pagespeed/.
#
# Required secret: PAGESPEED_API_KEY  (Settings → Secrets and variables →
# Actions → New repository secret).

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - '**/*.css'
      - '**/*.js'

permissions:
  contents: write

concurrency:
  group: post-deploy-check
  cancel-in-progress: false

jobs:
  pagespeed:
    runs-on: ubuntu-latest
    # Don't loop on our own commits.
    if: contains(github.event.head_commit.message, 'chore: post-deploy pagespeed report') == false
    steps:
      - uses: actions/checkout@v4

      - name: Wait 90s for GitHub Pages to redeploy
        run: sleep 90

      - name: Run pagespeed.sh
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: |
          if [ -z "${PAGESPEED_API_KEY:-}" ]; then
            echo "::error::PAGESPEED_API_KEY secret is not set."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          chmod +x scripts/pagespeed.sh
          bash scripts/pagespeed.sh

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain .pagespeed)" ]; then
            git add .pagespeed
            git commit -m "chore: post-deploy pagespeed report"
            git push
          else
            echo "No new pagespeed files to commit."
          fi
